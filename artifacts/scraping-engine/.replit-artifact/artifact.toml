kind = "web"
previewPath = "/build/"
title = "Scraping Engine — Store Creation"
version = "1.0.0"
id = "artifacts/scraping-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/build/" ]
localPort = 21997

[services.development]
run = "pnpm --filter @workspace/scraping-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scraping-engine", "run", "build" ]
publicDir = "artifacts/scraping-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21997"
BASE_PATH = "/build/"
