openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sokoa Marketing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead capture and intent tracking
  - name: stats
    description: Public marketing stats and social proof
  - name: stores
    description: Multi-tenant store engine
  - name: products
    description: Store product catalog
  - name: orders
    description: Order management and checkout
  - name: customers
    description: Customer accounts and tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Capture a lead from any marketing surface
      description: Stores user intent (e.g. Facebook/Instagram link, business name, TikTok handle) before authentication. Used by the homepage hero, TikTok page, and build flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewLead"
      responses:
        "201":
          description: Lead captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
  /leads/recent:
    get:
      operationId: listRecentLeads
      tags: [leads]
      summary: Recent merchant signups (anonymized)
      description: Live activity feed of newly created stores for social proof on the homepage.
      responses:
        "200":
          description: Recent leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentLead"
  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Platform-wide aggregate stats
      description: Headline numbers shown on homepage (active merchants, GMV, countries, payouts).
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"
  /stats/showcase:
    get:
      operationId: listShowcaseStores
      tags: [stats]
      summary: Featured demo stores
      description: Curated boutique showcase for the homepage social proof grid.
      responses:
        "200":
          description: Showcase stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShowcaseStore"
  /stats/testimonials:
    get:
      operationId: listTestimonials
      tags: [stats]
      summary: Merchant testimonials
      description: Real merchant quotes for the homepage.
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
  /stats/pricing:
    get:
      operationId: listPricingPlans
      tags: [stats]
      summary: Pricing plans
      description: Public pricing tiers including the TikTok hourly model.
      responses:
        "200":
          description: Pricing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingPlan"

  # ─── Stores ──────────────────────────────────────────────────────────────────
  /stores:
    get:
      operationId: listStores
      tags: [stores]
      summary: List all stores (optionally filter by tenantId)
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Stores list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a new store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewStore"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
  /stores/{storeId}:
    get:
      operationId: getStore
      tags: [stores]
      summary: Get a single store by ID
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Store not found
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update store settings or customization
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStore"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  # ─── Products ────────────────────────────────────────────────────────────────
  /stores/{storeId}/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Add a product to a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewProduct"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /stores/{storeId}/products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  # ─── Orders & Checkout ───────────────────────────────────────────────────────
  /stores/{storeId}/orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: phone
          in: query
          schema:
            type: string
          description: Filter by customer phone number
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order (checkout)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewOrder"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /stores/{storeId}/orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /stores/{storeId}/orders/{orderId}/delivery:
    post:
      operationId: submitDeliveryInfo
      tags: [orders]
      summary: Submit delivery info after successful payment
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryInfo"
      responses:
        "200":
          description: Delivery info saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─── Customers ───────────────────────────────────────────────────────────────
  /stores/{storeId}/customers/lookup:
    post:
      operationId: lookupCustomer
      tags: [customers]
      summary: Look up or create a customer by phone number
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLookup"
      responses:
        "200":
          description: Customer found or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
  /stores/{storeId}/customers/{customerId}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer profile
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer profile (set password, name, etc.)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomer"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    NewLead:
      type: object
      properties:
        inputValue:
          type: string
          description: The actual user input (FB/IG link, business name, TikTok handle, email).
          minLength: 1
          maxLength: 500
        source:
          type: string
          description: Where the lead was captured.
          enum: [homepage_hero, tiktok_page, socials_page, build_page, boutique_page, pricing_page, footer, navbar]
        intentType:
          type: string
          description: What the user wants to do.
          enum: [scrape_facebook, scrape_instagram, tiktok_live, explore, signup, contact]
        country:
          type: string
          description: ISO country code (optional).
          maxLength: 2
      required:
        - inputValue
        - source
        - intentType
    Lead:
      type: object
      properties:
        id:
          type: string
        inputValue:
          type: string
        source:
          type: string
        intentType:
          type: string
        country:
          type: string
          nullable: true
        nextStep:
          type: string
          description: Suggested next route in the funnel.
        sessionToken:
          type: string
          description: Opaque session token to attach this lead to a future signup.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - inputValue
        - source
        - intentType
        - nextStep
        - sessionToken
        - createdAt
    RecentLead:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
          description: Anonymized merchant name (e.g. "Aisha M.").
        city:
          type: string
        intentType:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, displayName, city, intentType, createdAt]
    PlatformStats:
      type: object
      properties:
        activeMerchants:
          type: integer
        storesCreatedToday:
          type: integer
        countriesServed:
          type: integer
        gmvProcessedKes:
          type: number
          description: Gross merchandise value processed (KES).
        averageStoreSetupSeconds:
          type: integer
        payoutsToday:
          type: integer
      required:
        - activeMerchants
        - storesCreatedToday
        - countriesServed
        - gmvProcessedKes
        - averageStoreSetupSeconds
        - payoutsToday
    ShowcaseStore:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        handle:
          type: string
          description: URL handle (e.g. "amani-boutique").
        category:
          type: string
        city:
          type: string
        tagline:
          type: string
        coverEmoji:
          type: string
          description: A single emoji used as a visual marker (NOT for UI, used as a data hint).
        productCount:
          type: integer
        monthlyRevenueKes:
          type: integer
      required:
        - id
        - name
        - handle
        - category
        - city
        - tagline
        - coverEmoji
        - productCount
        - monthlyRevenueKes
    Testimonial:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          description: Merchant role/title (e.g. "Boutique owner, Nairobi").
        quote:
          type: string
        platform:
          type: string
          enum: [facebook, instagram, tiktok, whatsapp]
        rating:
          type: integer
          minimum: 1
          maximum: 5
      required: [id, name, role, quote, platform, rating]
    PricingPlan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        priceKes:
          type: integer
          description: Price in KES (Kenyan Shillings). 0 means free.
        cadence:
          type: string
          enum: [hour, month, year, free]
        tagline:
          type: string
        features:
          type: array
          items:
            type: string
        popular:
          type: boolean
        ctaLabel:
          type: string
      required:
        - id
        - name
        - priceKes
        - cadence
        - tagline
        - features
        - popular
        - ctaLabel

    # ─── Store Schemas ──────────────────────────────────────────────────────────
    StoreTheme:
      type: object
      properties:
        primaryColor:
          type: string
          description: Primary brand color (hex)
        accentColor:
          type: string
        backgroundColor:
          type: string
        fontFamily:
          type: string
          enum: [plus_jakarta, outfit, inter, poppins]
        logoUrl:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        bannerText:
          type: string
          nullable: true
      required: [primaryColor, accentColor, backgroundColor, fontFamily]

    Store:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        slug:
          type: string
          description: URL-safe identifier (e.g. "amani-beauty")
        type:
          type: string
          enum: [tiktok, social, boutique]
        status:
          type: string
          enum: [draft, active, paused, suspended]
        domain:
          type: string
          description: Full store URL path (e.g. "/stores/abc123/amani-beauty")
        theme:
          $ref: "#/components/schemas/StoreTheme"
        productCount:
          type: integer
        orderCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, tenantId, name, slug, type, status, domain, theme, productCount, orderCount, createdAt, updatedAt]

    NewStore:
      type: object
      properties:
        tenantId:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum: [tiktok, social, boutique]
        theme:
          $ref: "#/components/schemas/StoreTheme"
      required: [tenantId, name, type]

    UpdateStore:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [draft, active, paused, suspended]
        theme:
          $ref: "#/components/schemas/StoreTheme"

    # ─── Product Schemas ────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: string
        storeId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceKes:
          type: number
        originalPriceKes:
          type: number
          nullable: true
          description: Original price before discount
        imageUrl:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string
          description: Additional image URLs
        category:
          type: string
          nullable: true
        stock:
          type: integer
          nullable: true
          description: null means unlimited
        featured:
          type: boolean
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, storeId, name, priceKes, featured, active, createdAt, images]

    NewProduct:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        priceKes:
          type: number
          minimum: 0
        originalPriceKes:
          type: number
          nullable: true
        imageUrl:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string
        category:
          type: string
          nullable: true
        stock:
          type: integer
          nullable: true
        featured:
          type: boolean
      required: [name, priceKes]

    # ─── Order Schemas ──────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        productId:
          type: string
        productName:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPriceKes:
          type: number
        totalKes:
          type: number
      required: [productId, productName, quantity, unitPriceKes, totalKes]

    DeliveryInfo:
      type: object
      properties:
        country:
          type: string
        county:
          type: string
        town:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
        notes:
          type: string
          nullable: true
      required: [country, county, town, phone]

    Order:
      type: object
      properties:
        id:
          type: string
        storeId:
          type: string
        customerId:
          type: string
          nullable: true
        phone:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalKes:
          type: number
        status:
          type: string
          enum: [pending, paid, failed, processing, shipped, delivered, cancelled]
        paymentMethod:
          type: string
          enum: [mpesa, card, cash]
        delivery:
          $ref: "#/components/schemas/DeliveryInfo"
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, storeId, phone, items, totalKes, status, paymentMethod, createdAt, updatedAt]

    NewOrder:
      type: object
      properties:
        phone:
          type: string
          description: Customer phone number (M-Pesa number)
          minLength: 9
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
                minimum: 1
            required: [productId, quantity]
          minItems: 1
        paymentMethod:
          type: string
          enum: [mpesa, card, cash]
          default: mpesa
      required: [phone, items]

    # ─── Customer Schemas ───────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: string
        storeId:
          type: string
        phone:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        hasPassword:
          type: boolean
          description: Whether the customer has set a password (for boutique accounts)
        orderCount:
          type: integer
        totalSpentKes:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, storeId, phone, hasPassword, orderCount, totalSpentKes, createdAt]

    CustomerLookup:
      type: object
      properties:
        phone:
          type: string
          minLength: 9
        password:
          type: string
          nullable: true
          description: Optional — used for boutique store login
      required: [phone]

    UpdateCustomer:
      type: object
      properties:
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
          minLength: 6
